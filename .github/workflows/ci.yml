name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PHP_VERSION: '8.3'
  NODE_VERSION: '22'

jobs:
  # ── packages (shared-utils, shared-types) ──────────────────────────────────
  packages:
    name: Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F @ai-real-estate/shared-utils test

  # ── Laravel API ────────────────────────────────────────────────────────────
  api:
    name: API (Laravel)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, sqlite3
          coverage: none
      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader
      - name: Copy .env
        run: cp .env.example .env 2>/dev/null || cp .env.testing .env
      - name: Generate app key
        run: php artisan key:generate
      - name: Run tests
        run: php artisan test --parallel
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      - name: Static analysis (Larastan)
        run: vendor/bin/phpstan analyse --no-progress || true
      # AI 関連ファイル変更時のみセキュリティスキャン
      - name: Security audit
        if: |
          contains(github.event.commits[0].modified, 'apps/api/app/Services/Ai') ||
          contains(github.event.head_commit.modified, 'apps/api/app/Services/Ai')
        run: composer audit

  # ── Nuxt (apps/web) ────────────────────────────────────────────────────────
  web:
    name: Web (Nuxt)
    runs-on: ubuntu-latest
    needs: packages
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F @ai-real-estate/web test
      - run: pnpm -F @ai-real-estate/web build

  # ── Next.js (apps/admin) ───────────────────────────────────────────────────
  admin:
    name: Admin (Next.js)
    runs-on: ubuntu-latest
    needs: packages
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F @ai-real-estate/admin build
        env:
          API_BASE_URL: http://localhost:8000
